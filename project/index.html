<style>
  :root {
    --bg: #FAF6EE;
    --bg-2: #F2EBDC;
    --ink: #2B2620;
    --ink-2: #6B6358;
    --line: #E6DFCE;
    --accent: #C8654A;
    --accent-soft: #F0D6CB;
    --card: #FFFCF5;
    --shadow: 0 1px 0 rgba(43,38,32,0.04), 0 8px 24px -12px rgba(43,38,32,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: var(--accent); }
  /* checker pattern for transparency */
  .checker {
    background-image:
      linear-gradient(45deg, var(--line) 25%, transparent 25%),
      linear-gradient(-45deg, var(--line) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--line) 75%),
      linear-gradient(-45deg, transparent 75%, var(--line) 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    background-color: var(--card);
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .maru { font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif; }
  button { outline: none; -webkit-tap-highlight-color: transparent; appearance: none; -webkit-appearance: none; }
  button:focus { outline: none; }
  button:focus-visible { outline: none; }
</style>
